<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout :: head('Places')}"></head>
<body>
<div class="d-flex">
    <div th:replace="~{layout :: navbar}"></div>
    <div class="main-content flex-grow-1">

        <div class="page-header">
            <h4><i class="bi bi-geo-alt-fill me-2" style="color:#f59e0b"></i>Places</h4>
            <a href="/ui/places/new" class="btn btn-primary btn-sm px-3">
                <i class="bi bi-plus-lg me-1"></i>Add Place
            </a>
        </div>

        <div th:if="${success}" class="alert alert-success alert-dismissible fade show" role="alert">
            <i class="bi bi-check-circle-fill me-2"></i><span th:text="${success}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
        <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
            <i class="bi bi-exclamation-circle-fill me-2"></i><span th:text="${error}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <div class="card">
            <div class="card-body p-0">
                <table class="table table-hover mb-0">
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>Place</th>
                            <th>Created By</th>
                            <th>Attachment</th>
                            <th>Created Date</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:if="${#lists.isEmpty(places)}">
                            <td colspan="6" class="text-center py-5">
                                <i class="bi bi-geo-alt fs-2 text-muted d-block mb-2"></i>
                                <span class="text-muted">No places found</span>
                            </td>
                        </tr>
                        <tr th:each="place : ${places}">
                            <td><span class="badge bg-light text-secondary fw-normal" th:text="${place.id}"></span></td>
                            <td class="fw-semibold" th:text="${place.place}"></td>
                            <td th:text="${place.createdBy}"></td>
                            <td>
                                <a th:if="${place.attachment != null}"
                                   th:href="@{'/' + ${place.attachment}}"
                                   target="_blank"
                                   class="btn btn-sm btn-outline-success">
                                    <i class="bi bi-paperclip me-1"></i>View
                                </a>
                                <span th:if="${place.attachment == null}" class="text-muted">—</span>
                            </td>
                            <td class="text-muted" th:text="${#dates.format(place.createdDate, 'dd MMM yyyy')}"></td>
                            <td>
                                <a th:href="@{/ui/places/edit/{id}(id=${place.id})}"
                                   class="btn btn-sm btn-outline-primary me-1" title="Edit">
                                    <i class="bi bi-pencil"></i>
                                </a>
                                <a th:href="@{/ui/places/delete/{id}(id=${place.id})}"
                                   class="btn btn-sm btn-outline-danger" title="Delete"
                                   onclick="return confirm('Delete this place?')">
                                    <i class="bi bi-trash"></i>
                                </a>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
