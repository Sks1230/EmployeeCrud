<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout :: head('Place Form')}"></head>
<body>
<div class="d-flex">
    <div th:replace="~{layout :: navbar}"></div>
    <div class="main-content flex-grow-1">

        <div class="page-header">
            <div>
                <a href="/ui/places" class="text-decoration-none text-muted small">
                    <i class="bi bi-arrow-left me-1"></i>Back to Places
                </a>
                <h4 class="mt-1" th:text="${place.id == null} ? 'Add Place' : 'Edit Place'"></h4>
            </div>
        </div>

        <div th:if="${error}" class="alert alert-danger mb-3">
            <i class="bi bi-exclamation-circle-fill me-2"></i><span th:text="${error}"></span>
        </div>

        <div class="card" style="max-width:500px">
            <div class="card-body p-4">
                <form th:action="${place.id == null} ? '/ui/places/save' : '/ui/places/update/' + ${place.id}"
                      method="post" enctype="multipart/form-data">
                    <div class="mb-3">
                        <label class="form-label">Place Name</label>
                        <input type="text" name="place" class="form-control"
                               placeholder="e.g. Head Office"
                               th:value="${place.place}"/>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Created By</label>
                        <input type="text" name="createdBy" class="form-control"
                               placeholder="Employee name or code"
                               th:value="${place.createdBy}"/>
                    </div>
                    <div class="mb-4">
                        <label class="form-label">Attachment <small class="text-muted fw-normal">(JPG, PNG, PDF)</small></label>
                        <input type="file" name="file" class="form-control" accept=".jpg,.jpeg,.png,.pdf"/>
                        <div th:if="${place.attachment != null}" class="mt-2 d-flex align-items-center gap-2 p-2 rounded" style="background:#f8fafc;border:1px solid #e2e8f0">
                            <i class="bi bi-paperclip text-muted"></i>
                            <span class="text-muted small" th:text="${place.attachment}"></span>
                        </div>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">
                        <i class="bi bi-check-circle me-1"></i>
                        <span th:text="${place.id == null} ? 'Create Place' : 'Update Place'"></span>
                    </button>
                </form>
            </div>
        </div>

    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
