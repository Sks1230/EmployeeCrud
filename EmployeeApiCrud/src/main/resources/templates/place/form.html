<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout :: head('Place Form')}"></head>
<body>
<div class="d-flex">
    <div th:replace="~{layout :: navbar}"></div>
    <div class="main-content flex-grow-1" style="margin-left: 220px;">
        <div class="mb-4">
            <a href="/ui/places" class="text-decoration-none text-muted"><i class="bi bi-arrow-left me-1"></i>Back</a>
            <h4 class="mt-2" th:text="${place.id == null} ? 'Add Place' : 'Edit Place'"></h4>
        </div>

        <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

        <div class="card shadow-sm" style="max-width: 500px;">
            <div class="card-body">
                <form th:action="${place.id == null} ? '/ui/places/save' : '/ui/places/update/' + ${place.id}"
                      method="post" enctype="multipart/form-data">
                    <div class="mb-3">
                        <label class="form-label">Place</label>
                        <input type="text" name="place" class="form-control" th:value="${place.place}"/>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Created By</label>
                        <input type="text" name="createdBy" class="form-control" th:value="${place.createdBy}"/>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Attachment <small class="text-muted">(JPG, PNG, PDF)</small></label>
                        <input type="file" name="file" class="form-control" accept=".jpg,.jpeg,.png,.pdf"/>
                        <div th:if="${place.attachment != null}" class="form-text text-muted">
                            Current: <span th:text="${place.attachment}"></span>
                        </div>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">
                        <span th:text="${place.id == null} ? 'Create' : 'Update'"></span>
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
