<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout :: head('Employees')}"></head>
<body>
<div class="d-flex">
    <div th:replace="~{layout :: navbar}"></div>
    <div class="main-content flex-grow-1">

        <div class="page-header">
            <h4><i class="bi bi-people-fill me-2" style="color:#6366f1"></i>Employees</h4>
            <a href="/ui/employees/new" class="btn btn-primary btn-sm px-3">
                <i class="bi bi-plus-lg me-1"></i>Add Employee
            </a>
        </div>

        <div th:if="${success}" class="alert alert-success alert-dismissible fade show" role="alert">
            <i class="bi bi-check-circle-fill me-2"></i><span th:text="${success}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
        <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
            <i class="bi bi-exclamation-circle-fill me-2"></i><span th:text="${error}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <div class="card">
            <div class="card-body p-0">
                <table class="table table-hover mb-0">
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>Name</th>
                            <th>Age</th>
                            <th>City</th>
                            <th>Salary</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:if="${#lists.isEmpty(employees)}">
                            <td colspan="6" class="text-center py-5">
                                <i class="bi bi-people fs-2 text-muted d-block mb-2"></i>
                                <span class="text-muted">No employees found</span>
                            </td>
                        </tr>
                        <tr th:each="emp : ${employees}">
                            <td><span class="badge bg-light text-secondary fw-normal" th:text="${emp.empid}"></span></td>
                            <td class="fw-semibold" th:text="${emp.emp_name}"></td>
                            <td th:text="${emp.emp_age}"></td>
                            <td><i class="bi bi-geo-alt text-muted me-1"></i><span th:text="${emp.emp_city}"></span></td>
                            <td><span class="fw-semibold" th:text="'₹ ' + ${emp.emp_salary}"></span></td>
                            <td>
                                <a th:href="@{/ui/employees/edit/{id}(id=${emp.empid})}"
                                   class="btn btn-sm btn-outline-primary me-1" title="Edit">
                                    <i class="bi bi-pencil"></i>
                                </a>
                                <a th:href="@{/ui/employees/delete/{id}(id=${emp.empid})}"
                                   class="btn btn-sm btn-outline-danger"
                                   title="Delete"
                                   onclick="return confirm('Delete this employee?')">
                                    <i class="bi bi-trash"></i>
                                </a>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
