<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout :: head('Employees')}"></head>
<body>
<div class="d-flex">
    <div th:replace="~{layout :: navbar}"></div>
    <div class="main-content flex-grow-1" style="margin-left: 220px;">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h4 class="mb-0"><i class="bi bi-people-fill me-2"></i>Employees</h4>
            <a href="/ui/employees/new" class="btn btn-primary"><i class="bi bi-plus-lg me-1"></i>Add Employee</a>
        </div>

        <div th:if="${success}" class="alert alert-success alert-dismissible fade show" role="alert">
            <span th:text="${success}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
        <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
            <span th:text="${error}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <div class="card shadow-sm">
            <div class="card-body p-0">
                <table class="table table-hover mb-0">
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>Name</th>
                            <th>Age</th>
                            <th>City</th>
                            <th>Salary</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:if="${#lists.isEmpty(employees)}">
                            <td colspan="6" class="text-center text-muted py-4">No employees found</td>
                        </tr>
                        <tr th:each="emp : ${employees}">
                            <td th:text="${emp.empid}"></td>
                            <td th:text="${emp.emp_name}"></td>
                            <td th:text="${emp.emp_age}"></td>
                            <td th:text="${emp.emp_city}"></td>
                            <td th:text="${emp.emp_salary}"></td>
                            <td>
                                <a th:href="@{/ui/employees/edit/{id}(id=${emp.empid})}" class="btn btn-sm btn-outline-primary me-1">
                                    <i class="bi bi-pencil"></i>
                                </a>
                                <a th:href="@{/ui/employees/delete/{id}(id=${emp.empid})}"
                                   class="btn btn-sm btn-outline-danger"
                                   onclick="return confirm('Delete this employee?')">
                                    <i class="bi bi-trash"></i>
                                </a>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
