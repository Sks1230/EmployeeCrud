<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout :: head('Employee Form')}"></head>
<body>
<div class="d-flex">
    <div th:replace="~{layout :: navbar}"></div>
    <div class="main-content flex-grow-1" style="margin-left: 220px;">
        <div class="mb-4">
            <a href="/ui/employees" class="text-decoration-none text-muted"><i class="bi bi-arrow-left me-1"></i>Back</a>
            <h4 class="mt-2" th:text="${employee.empid == null} ? 'Add Employee' : 'Edit Employee'"></h4>
        </div>

        <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

        <div class="card shadow-sm" style="max-width: 500px;">
            <div class="card-body">
                <form th:action="${employee.empid == null} ? '/ui/employees/save' : '/ui/employees/update/' + ${employee.empid}"
                      method="post">
                    <div class="mb-3">
                        <label class="form-label">Emp Code <small class="text-muted">(4 digits)</small></label>
                        <input type="text" name="empCode" class="form-control"
                               maxlength="4" pattern="[0-9]{4}"
                               placeholder="e.g. 1001"
                               th:value="${employee.empCode}"/>
                    </div>
                    <div class="mb-3" th:if="${employee.empid == null}">
                        <label class="form-label">Password</label>
                        <input type="password" name="password" class="form-control" placeholder="Set initial password"/>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Name</label>
                        <input type="text" name="emp_name" class="form-control" th:value="${employee.emp_name}"/>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Age</label>
                        <input type="number" name="emp_age" class="form-control" th:value="${employee.emp_age}"/>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">City</label>
                        <input type="text" name="emp_city" class="form-control" th:value="${employee.emp_city}"/>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Salary</label>
                        <input type="number" step="0.01" name="emp_salary" class="form-control" th:value="${employee.emp_salary}"/>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">
                        <span th:text="${employee.empid == null} ? 'Create' : 'Update'"></span>
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
