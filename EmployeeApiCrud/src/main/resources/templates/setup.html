<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>First Time Setup — CRM</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css"/>
    <style>
        body { background-color: #212529; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body>
<div class="card shadow-lg" style="width: 420px;">
    <div class="card-body p-4">
        <div class="text-center mb-4">
            <i class="bi bi-person-plus-fill fs-1 text-success"></i>
            <h4 class="mt-2 fw-bold">First Time Setup</h4>
            <p class="text-muted small">Create your admin account to get started</p>
        </div>

        <div th:if="${error}" class="alert alert-danger py-2 small" th:text="${error}"></div>

        <form method="post" action="/setup">
            <div class="mb-3">
                <label class="form-label fw-semibold">Name</label>
                <input type="text" name="emp_name" class="form-control" placeholder="Your name" required/>
            </div>
            <div class="mb-3">
                <label class="form-label fw-semibold">Emp Code <small class="text-muted">(exactly 4 digits)</small></label>
                <input type="text" name="empCode" class="form-control"
                       placeholder="e.g. 1001" maxlength="4" pattern="[0-9]{4}" required/>
            </div>
            <div class="mb-3">
                <label class="form-label fw-semibold">Password</label>
                <div class="input-group">
                    <input type="password" id="setupPassword" name="password" class="form-control"
                           placeholder="Set a password" required/>
                    <button type="button" class="btn btn-outline-secondary" onclick="togglePassword('setupPassword', 'setupEye')">
                        <i id="setupEye" class="bi bi-eye"></i>
                    </button>
                </div>
            </div>
            <div class="mb-4">
                <label class="form-label fw-semibold">City</label>
                <input type="text" name="emp_city" class="form-control" placeholder="Your city"/>
            </div>
            <button type="submit" class="btn btn-success w-100">
                <i class="bi bi-check-circle me-1"></i> Create Account &amp; Login
            </button>
        </form>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    function togglePassword(inputId, iconId) {
        const input = document.getElementById(inputId);
        const icon = document.getElementById(iconId);
        if (input.type === 'password') {
            input.type = 'text';
            icon.classList.replace('bi-eye', 'bi-eye-slash');
        } else {
            input.type = 'password';
            icon.classList.replace('bi-eye-slash', 'bi-eye');
        }
    }
</script>
</body>
</html>
