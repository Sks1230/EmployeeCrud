<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout :: head('Dashboard')}"></head>
<body>
<div class="d-flex">
    <div th:replace="~{layout :: navbar}"></div>
    <div class="main-content flex-grow-1" style="margin-left: 220px;">
        <h4 class="mb-4">Dashboard</h4>
        <div class="row g-4">
            <div class="col-md-4">
                <a href="/ui/employees" class="text-decoration-none">
                    <div class="card shadow-sm border-0 text-white bg-primary">
                        <div class="card-body d-flex align-items-center gap-3">
                            <i class="bi bi-people-fill fs-1"></i>
                            <div>
                                <h5 class="mb-0">Employees</h5>
                                <small>Manage employee records</small>
                            </div>
                        </div>
                    </div>
                </a>
            </div>
            <div class="col-md-4">
                <a href="/ui/assets" class="text-decoration-none">
                    <div class="card shadow-sm border-0 text-white bg-success">
                        <div class="card-body d-flex align-items-center gap-3">
                            <i class="bi bi-box-seam-fill fs-1"></i>
                            <div>
                                <h5 class="mb-0">Assets</h5>
                                <small>Manage company assets</small>
                            </div>
                        </div>
                    </div>
                </a>
            </div>
            <div class="col-md-4">
                <a href="/ui/places" class="text-decoration-none">
                    <div class="card shadow-sm border-0 text-white bg-warning">
                        <div class="card-body d-flex align-items-center gap-3">
                            <i class="bi bi-geo-alt-fill fs-1"></i>
                            <div>
                                <h5 class="mb-0 text-dark">Places</h5>
                                <small class="text-dark">Manage places</small>
                            </div>
                        </div>
                    </div>
                </a>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
