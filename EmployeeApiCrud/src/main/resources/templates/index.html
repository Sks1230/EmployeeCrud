<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout :: head('Dashboard')}"></head>
<body>
<div class="d-flex">
    <div th:replace="~{layout :: navbar}"></div>
    <div class="main-content flex-grow-1">

        <div class="page-header">
            <div>
                <h4><i class="bi bi-speedometer2 me-2 text-primary"></i>Dashboard</h4>
                <p class="text-muted mb-0" style="font-size:0.85rem">Welcome back! Here's a quick overview.</p>
            </div>
        </div>

        <div class="row g-4">
            <div class="col-md-4">
                <a href="/ui/employees" class="text-decoration-none">
                    <div class="card p-4 h-100" style="transition: box-shadow 0.2s, transform 0.2s;"
                         onmouseover="this.style.boxShadow='0 8px 25px rgba(99,102,241,0.15)';this.style.transform='translateY(-2px)'"
                         onmouseout="this.style.boxShadow='';this.style.transform=''">
                        <div class="d-flex align-items-center gap-3">
                            <div style="width:50px;height:50px;background:#eef2ff;border-radius:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0;">
                                <i class="bi bi-people-fill fs-4" style="color:#6366f1"></i>
                            </div>
                            <div class="flex-grow-1">
                                <div class="fw-bold text-dark" style="font-size:0.95rem">Employees</div>
                                <div class="text-muted" style="font-size:0.8rem">Manage employee records</div>
                            </div>
                            <i class="bi bi-arrow-right text-muted"></i>
                        </div>
                    </div>
                </a>
            </div>
            <div class="col-md-4">
                <a href="/ui/assets" class="text-decoration-none">
                    <div class="card p-4 h-100" style="transition: box-shadow 0.2s, transform 0.2s;"
                         onmouseover="this.style.boxShadow='0 8px 25px rgba(16,185,129,0.15)';this.style.transform='translateY(-2px)'"
                         onmouseout="this.style.boxShadow='';this.style.transform=''">
                        <div class="d-flex align-items-center gap-3">
                            <div style="width:50px;height:50px;background:#ecfdf5;border-radius:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0;">
                                <i class="bi bi-box-seam-fill fs-4" style="color:#10b981"></i>
                            </div>
                            <div class="flex-grow-1">
                                <div class="fw-bold text-dark" style="font-size:0.95rem">Assets</div>
                                <div class="text-muted" style="font-size:0.8rem">Manage company assets</div>
                            </div>
                            <i class="bi bi-arrow-right text-muted"></i>
                        </div>
                    </div>
                </a>
            </div>
            <div class="col-md-4">
                <a href="/ui/places" class="text-decoration-none">
                    <div class="card p-4 h-100" style="transition: box-shadow 0.2s, transform 0.2s;"
                         onmouseover="this.style.boxShadow='0 8px 25px rgba(245,158,11,0.15)';this.style.transform='translateY(-2px)'"
                         onmouseout="this.style.boxShadow='';this.style.transform=''">
                        <div class="d-flex align-items-center gap-3">
                            <div style="width:50px;height:50px;background:#fffbeb;border-radius:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0;">
                                <i class="bi bi-geo-alt-fill fs-4" style="color:#f59e0b"></i>
                            </div>
                            <div class="flex-grow-1">
                                <div class="fw-bold text-dark" style="font-size:0.95rem">Places</div>
                                <div class="text-muted" style="font-size:0.8rem">Manage locations</div>
                            </div>
                            <i class="bi bi-arrow-right text-muted"></i>
                        </div>
                    </div>
                </a>
            </div>
        </div>

    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
