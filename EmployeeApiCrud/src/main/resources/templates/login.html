<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Login — CRM</title>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"/>
    <style>
        *, body { font-family: 'Inter', sans-serif; }
        body {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 55%, #312e81 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-wrapper { width: 100%; max-width: 420px; padding: 1rem; }
        .login-card {
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 25px 60px rgba(0,0,0,0.35);
            overflow: hidden;
        }
        .login-header {
            background: linear-gradient(135deg, #0f172a, #1e1b4b);
            padding: 2rem 2rem 1.75rem;
            text-align: center;
        }
        .login-logo {
            width: 52px; height: 52px;
            background: #6366f1;
            border-radius: 14px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            margin-bottom: 0.85rem;
            box-shadow: 0 6px 16px rgba(99,102,241,0.45);
        }
        .login-header h5 { color: #fff; font-weight: 700; margin: 0 0 0.25rem; font-size: 1.15rem; }
        .login-header p { color: #94a3b8; font-size: 0.85rem; margin: 0; }
        .login-body { padding: 1.75rem 2rem 2rem; }
        .form-label { font-size: 0.85rem; font-weight: 600; color: #475569; margin-bottom: 0.35rem; }
        .form-control {
            border-color: #e2e8f0;
            border-radius: 8px;
            font-size: 0.9rem;
            padding: 0.6rem 0.9rem;
            transition: border-color 0.15s, box-shadow 0.15s;
        }
        .form-control:focus {
            border-color: #6366f1;
            box-shadow: 0 0 0 3px rgba(99,102,241,0.12);
        }
        .form-text { font-size: 0.78rem; color: #94a3b8; }
        .btn-login {
            background: #6366f1;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            font-size: 0.9rem;
            padding: 0.65rem;
            transition: background 0.2s, transform 0.1s;
        }
        .btn-login:hover { background: #4f46e5; }
        .btn-login:active { transform: scale(0.99); }
        .btn-outline-secondary { border-color: #e2e8f0; color: #64748b; }
        .btn-outline-secondary:hover { background: #f8fafc; color: #334155; }
        .alert { border: none; border-radius: 8px; font-size: 0.85rem; }
        .alert-danger { background: #fef2f2; color: #991b1b; }
        .alert-success { background: #f0fdf4; color: #166534; }
    </style>
</head>
<body>
<div class="login-wrapper">
    <div class="login-card">
        <div class="login-header">
            <div class="login-logo"><i class="bi bi-grid-fill text-white"></i></div>
            <h5>Welcome back</h5>
            <p>Sign in to your CRM account</p>
        </div>
        <div class="login-body">
            <div th:if="${error}" class="alert alert-danger py-2 mb-3" th:text="${error}"></div>
            <div th:if="${success}" class="alert alert-success py-2 mb-3" th:text="${success}"></div>

            <form method="post" action="/login">
                <div class="mb-3">
                    <label class="form-label">Employee Code</label>
                    <input type="text" name="empCode" class="form-control"
                           placeholder="Enter 4-digit code"
                           maxlength="4" pattern="[0-9]{4}"
                           required autofocus/>
                    <div class="form-text">4-digit numeric code</div>
                </div>
                <div class="mb-4">
                    <label class="form-label">Password</label>
                    <div class="input-group">
                        <input type="password" id="loginPassword" name="password" class="form-control"
                               placeholder="Enter your password" required/>
                        <button type="button" class="btn btn-outline-secondary"
                                onclick="togglePassword('loginPassword','loginEye')"
                                style="border-top-right-radius:8px;border-bottom-right-radius:8px">
                            <i id="loginEye" class="bi bi-eye"></i>
                        </button>
                    </div>
                </div>
                <button type="submit" class="btn btn-login btn-primary w-100">
                    <i class="bi bi-box-arrow-in-right me-1"></i> Sign In
                </button>
            </form>
        </div>
    </div>
    <p class="text-center text-secondary mt-3" style="font-size:0.78rem;opacity:0.6">CRM Panel &copy; 2025</p>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    function togglePassword(inputId, iconId) {
        const input = document.getElementById(inputId);
        const icon = document.getElementById(iconId);
        if (input.type === 'password') {
            input.type = 'text';
            icon.classList.replace('bi-eye', 'bi-eye-slash');
        } else {
            input.type = 'password';
            icon.classList.replace('bi-eye-slash', 'bi-eye');
        }
    }
</script>
</body>
</html>
