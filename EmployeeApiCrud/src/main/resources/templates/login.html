<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Login — CRM</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css"/>
    <style>
        body { background-color: #212529; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body>
<div class="card shadow-lg" style="width: 380px;">
    <div class="card-body p-4">
        <div class="text-center mb-4">
            <i class="bi bi-grid-fill fs-1 text-primary"></i>
            <h4 class="mt-2 fw-bold">CRM Panel</h4>
            <p class="text-muted small">Sign in to your account</p>
        </div>

        <div th:if="${error}" class="alert alert-danger py-2 small" th:text="${error}"></div>
        <div th:if="${success}" class="alert alert-success py-2 small" th:text="${success}"></div>

        <form method="post" action="/login">
            <div class="mb-3">
                <label class="form-label fw-semibold">Emp Code</label>
                <input type="text" name="empCode" class="form-control"
                       placeholder="Enter 4-digit code"
                       maxlength="4" pattern="[0-9]{4}"
                       required autofocus/>
                <div class="form-text">4-digit employee code</div>
            </div>
            <div class="mb-4">
                <label class="form-label fw-semibold">Password</label>
                <div class="input-group">
                    <input type="password" id="loginPassword" name="password" class="form-control"
                           placeholder="Enter password" required/>
                    <button type="button" class="btn btn-outline-secondary" onclick="togglePassword('loginPassword', 'loginEye')">
                        <i id="loginEye" class="bi bi-eye"></i>
                    </button>
                </div>
            </div>
            <button type="submit" class="btn btn-primary w-100">
                <i class="bi bi-box-arrow-in-right me-1"></i> Login
            </button>
        </form>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    function togglePassword(inputId, iconId) {
        const input = document.getElementById(inputId);
        const icon = document.getElementById(iconId);
        if (input.type === 'password') {
            input.type = 'text';
            icon.classList.replace('bi-eye', 'bi-eye-slash');
        } else {
            input.type = 'password';
            icon.classList.replace('bi-eye-slash', 'bi-eye');
        }
    }
</script>
</body>
</html>
