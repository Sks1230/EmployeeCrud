<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:fragment="head(title)">
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title th:text="${title} + ' — CRM'">CRM</title>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"/>
    <style>
        :root {
            --sidebar-width: 250px;
            --sidebar-bg: #0f172a;
            --accent: #6366f1;
            --accent-hover: #4f46e5;
        }
        *, body { font-family: 'Inter', sans-serif; }
        body { background-color: #f1f5f9; }

        /* ── Sidebar ── */
        .sidebar {
            width: var(--sidebar-width);
            min-height: 100vh;
            background: var(--sidebar-bg);
            position: fixed;
            top: 0; bottom: 0; left: 0;
            display: flex;
            flex-direction: column;
            z-index: 100;
            box-shadow: 4px 0 20px rgba(0,0,0,0.18);
        }
        .sidebar-brand {
            padding: 1.35rem 1.25rem;
            border-bottom: 1px solid rgba(255,255,255,0.07);
            display: flex;
            align-items: center;
            gap: 0.65rem;
            text-decoration: none;
        }
        .brand-icon {
            width: 36px; height: 36px;
            background: var(--accent);
            border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.05rem;
            flex-shrink: 0;
            box-shadow: 0 4px 10px rgba(99,102,241,0.4);
        }
        .brand-text { color: #fff; font-size: 1rem; font-weight: 700; letter-spacing: 0.2px; }
        .sidebar-nav { flex: 1; padding: 1rem 0.75rem; overflow-y: auto; }
        .nav-section-label {
            color: #475569;
            font-size: 0.65rem;
            font-weight: 600;
            letter-spacing: 1.2px;
            text-transform: uppercase;
            padding: 0.5rem 0.6rem 0.3rem;
        }
        .sidebar .nav-link {
            color: #94a3b8;
            border-radius: 8px;
            padding: 0.55rem 0.75rem;
            font-size: 0.875rem;
            font-weight: 500;
            transition: all 0.15s ease;
            margin-bottom: 2px;
            display: flex;
            align-items: center;
        }
        .sidebar .nav-link i { width: 20px; text-align: center; }
        .sidebar .nav-link:hover { color: #e2e8f0; background: rgba(255,255,255,0.06); }
        .sidebar .nav-link.active {
            color: #fff;
            background: var(--accent);
            box-shadow: 0 3px 10px rgba(99,102,241,0.4);
        }
        .sidebar-footer {
            padding: 1rem 1.25rem;
            border-top: 1px solid rgba(255,255,255,0.07);
        }
        .user-avatar {
            width: 34px; height: 34px;
            background: var(--accent);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-weight: 700; font-size: 0.82rem; color: #fff;
            flex-shrink: 0;
        }
        .logout-btn {
            display: flex; align-items: center; gap: 0.5rem;
            padding: 0.45rem 0.6rem;
            border-radius: 7px;
            color: #f87171; font-size: 0.85rem; font-weight: 500;
            text-decoration: none;
            transition: background 0.15s;
            margin-top: 0.5rem;
        }
        .logout-btn:hover { background: rgba(248,113,113,0.1); color: #f87171; }

        /* ── Main content ── */
        .main-content { padding: 2rem 2.5rem; margin-left: var(--sidebar-width); min-height: 100vh; }

        /* ── Cards ── */
        .card { border: none !important; border-radius: 12px; box-shadow: 0 1px 4px rgba(0,0,0,0.06), 0 4px 12px rgba(0,0,0,0.04); }

        /* ── Tables ── */
        .table th {
            background: #f8fafc;
            color: #64748b;
            font-size: 0.72rem;
            font-weight: 600;
            letter-spacing: 0.6px;
            text-transform: uppercase;
            border-bottom: 2px solid #e2e8f0 !important;
            padding: 0.85rem 1rem;
        }
        .table td { vertical-align: middle; color: #334155; font-size: 0.875rem; padding: 0.75rem 1rem; border-color: #f1f5f9; }
        .table tbody tr:hover td { background: #f8fafc; }

        /* ── Buttons ── */
        .btn-primary { background: var(--accent); border-color: var(--accent); font-weight: 500; }
        .btn-primary:hover, .btn-primary:focus { background: var(--accent-hover); border-color: var(--accent-hover); }
        .btn-outline-primary { color: var(--accent); border-color: var(--accent); }
        .btn-outline-primary:hover { background: var(--accent); border-color: var(--accent); }

        /* ── Forms ── */
        .form-label { font-size: 0.85rem; font-weight: 600; color: #475569; margin-bottom: 0.35rem; }
        .form-control, .form-select { border-color: #e2e8f0; border-radius: 8px; font-size: 0.9rem; padding: 0.55rem 0.85rem; transition: border-color 0.15s, box-shadow 0.15s; }
        .form-control:focus, .form-select:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(99,102,241,0.12); }
        .form-text { font-size: 0.78rem; color: #94a3b8; }

        /* ── Alerts ── */
        .alert { border: none; border-radius: 10px; font-size: 0.875rem; }
        .alert-success { background: #f0fdf4; color: #166534; }
        .alert-danger { background: #fef2f2; color: #991b1b; }

        /* ── Page header ── */
        .page-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.5rem; padding-bottom: 1rem; border-bottom: 1px solid #e2e8f0; }
        .page-header h4 { color: #1e293b; font-weight: 700; margin: 0; font-size: 1.2rem; }
    </style>
</head>
<body>
<div th:fragment="navbar">
    <div class="sidebar">
        <a href="/" class="sidebar-brand">
            <div class="brand-icon"><i class="bi bi-grid-fill text-white"></i></div>
            <span class="brand-text">CRM Panel</span>
        </a>
        <nav class="sidebar-nav">
            <div class="nav-section-label">Main Menu</div>
            <ul class="nav flex-column mt-1">
                <li class="nav-item">
                    <a href="/ui/employees" class="nav-link" th:classappend="${currentPage == 'employees'} ? ' active'">
                        <i class="bi bi-people-fill me-2"></i>Employees
                    </a>
                </li>
                <li class="nav-item">
                    <a href="/ui/assets" class="nav-link" th:classappend="${currentPage == 'assets'} ? ' active'">
                        <i class="bi bi-box-seam-fill me-2"></i>Assets
                    </a>
                </li>
                <li class="nav-item">
                    <a href="/ui/places" class="nav-link" th:classappend="${currentPage == 'places'} ? ' active'">
                        <i class="bi bi-geo-alt-fill me-2"></i>Places
                    </a>
                </li>
            </ul>
            <div class="nav-section-label mt-3">Account</div>
            <ul class="nav flex-column mt-1">
                <li class="nav-item">
                    <a href="/ui/profile" class="nav-link" th:classappend="${currentPage == 'profile'} ? ' active'">
                        <i class="bi bi-person-fill me-2"></i>My Profile
                    </a>
                </li>
                <li class="nav-item">
                    <a href="/ui/change-password" class="nav-link" th:classappend="${currentPage == 'change-password'} ? ' active'">
                        <i class="bi bi-key-fill me-2"></i>Change Password
                    </a>
                </li>
            </ul>
        </nav>
        <div class="sidebar-footer">
            <div th:if="${session.loggedInEmployee}" class="d-flex align-items-center gap-2 mb-2">
                <div class="user-avatar" th:text="${#strings.substring(session.loggedInEmployee.emp_name,0,1).toUpperCase()}">U</div>
                <div style="min-width:0">
                    <div class="text-white fw-semibold text-truncate" style="font-size:0.82rem" th:text="${session.loggedInEmployee.emp_name}"></div>
                    <div class="text-secondary" style="font-size:0.72rem" th:text="'Code · ' + ${session.loggedInEmployee.empCode}"></div>
                </div>
            </div>
            <a href="/logout" class="logout-btn"><i class="bi bi-box-arrow-right"></i>Logout</a>
        </div>
    </div>
</div>
</body>
</html>
