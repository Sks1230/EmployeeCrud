<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:fragment="head(title)">
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title th:text="${title}">CRM</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css"/>
    <style>
        body { background-color: #f8f9fa; }
        .sidebar { min-height: 100vh; background-color: #212529; }
        .sidebar .nav-link { color: #adb5bd; }
        .sidebar .nav-link:hover, .sidebar .nav-link.active { color: #ffffff; background-color: #343a40; border-radius: 6px; }
        .sidebar .brand { color: #ffffff; font-size: 1.2rem; font-weight: bold; }
        .main-content { padding: 2rem; }
        .table th { background-color: #343a40; color: white; }
    </style>
</head>
<body>
<div th:fragment="navbar">
    <div class="d-flex flex-column flex-shrink-0 p-3 sidebar" style="width: 220px; position: fixed; top: 0; bottom: 0;">
        <a href="/" class="brand mb-4 text-decoration-none"><i class="bi bi-grid-fill me-2"></i>CRM Panel</a>
        <ul class="nav nav-pills flex-column mb-auto gap-1">
            <li class="nav-item">
                <a href="/ui/employees" class="nav-link" th:classappend="${currentPage == 'employees'} ? 'active'">
                    <i class="bi bi-people-fill me-2"></i>Employees
                </a>
            </li>
            <li class="nav-item">
                <a href="/ui/assets" class="nav-link" th:classappend="${currentPage == 'assets'} ? 'active'">
                    <i class="bi bi-box-seam-fill me-2"></i>Assets
                </a>
            </li>
            <li class="nav-item">
                <a href="/ui/places" class="nav-link" th:classappend="${currentPage == 'places'} ? 'active'">
                    <i class="bi bi-geo-alt-fill me-2"></i>Places
                </a>
            </li>
            <li class="nav-item">
                <a href="/ui/profile" class="nav-link" th:classappend="${currentPage == 'profile'} ? 'active'">
                    <i class="bi bi-person-fill me-2"></i>My Profile
                </a>
            </li>
        </ul>
        <hr class="border-secondary"/>
        <div th:if="${session.loggedInEmployee}" class="text-muted small mb-2">
            <i class="bi bi-person-circle me-1"></i>
            <span th:text="${session.loggedInEmployee.emp_name}"></span>
            <span class="badge bg-secondary ms-1" th:text="${session.loggedInEmployee.empCode}"></span>
        </div>
        <a href="/ui/change-password" class="nav-link text-warning mb-1" th:classappend="${currentPage == 'change-password'} ? 'active'">
            <i class="bi bi-key-fill me-2"></i>Change Password
        </a>
        <a href="/logout" class="nav-link text-danger">
            <i class="bi bi-box-arrow-right me-2"></i>Logout
        </a>
    </div>
</div>
</body>
</html>
