<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout :: head('Change Password')}"></head>
<body>
<div class="d-flex">
    <div th:replace="~{layout :: navbar}"></div>
    <div class="main-content flex-grow-1">

        <div class="page-header">
            <div>
                <a href="/" class="text-decoration-none text-muted small">
                    <i class="bi bi-arrow-left me-1"></i>Back to Dashboard
                </a>
                <h4 class="mt-1"><i class="bi bi-key-fill me-2" style="color:#6366f1"></i>Change Password</h4>
            </div>
        </div>

        <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
            <i class="bi bi-exclamation-circle-fill me-2"></i><span th:text="${error}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <div class="card" style="max-width:420px">
            <div class="card-body p-4">
                <form method="post" action="/ui/change-password">
                    <div class="mb-3">
                        <label class="form-label">Current Password</label>
                        <div class="input-group">
                            <input type="password" id="currentPwd" name="currentPassword" class="form-control" required placeholder="Current password"/>
                            <button type="button" class="btn btn-outline-secondary" onclick="togglePassword('currentPwd','eyeCurrent')">
                                <i id="eyeCurrent" class="bi bi-eye"></i>
                            </button>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">New Password</label>
                        <div class="input-group">
                            <input type="password" id="newPwd" name="newPassword" class="form-control" required placeholder="New password"/>
                            <button type="button" class="btn btn-outline-secondary" onclick="togglePassword('newPwd','eyeNew')">
                                <i id="eyeNew" class="bi bi-eye"></i>
                            </button>
                        </div>
                    </div>
                    <div class="mb-4">
                        <label class="form-label">Confirm New Password</label>
                        <div class="input-group">
                            <input type="password" id="confirmPwd" name="confirmPassword" class="form-control" required placeholder="Confirm new password"/>
                            <button type="button" class="btn btn-outline-secondary" onclick="togglePassword('confirmPwd','eyeConfirm')">
                                <i id="eyeConfirm" class="bi bi-eye"></i>
                            </button>
                        </div>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">
                        <i class="bi bi-shield-lock me-1"></i>Update Password
                    </button>
                </form>
            </div>
        </div>

    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    function togglePassword(inputId, iconId) {
        const input = document.getElementById(inputId);
        const icon = document.getElementById(iconId);
        if (input.type === 'password') {
            input.type = 'text';
            icon.classList.replace('bi-eye', 'bi-eye-slash');
        } else {
            input.type = 'password';
            icon.classList.replace('bi-eye-slash', 'bi-eye');
        }
    }
</script>
</body>
</html>
