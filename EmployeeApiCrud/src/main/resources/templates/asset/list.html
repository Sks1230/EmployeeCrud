<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout :: head('Assets')}"></head>
<body>
<div class="d-flex">
    <div th:replace="~{layout :: navbar}"></div>
    <div class="main-content flex-grow-1" style="margin-left: 220px;">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h4 class="mb-0"><i class="bi bi-box-seam-fill me-2"></i>Assets</h4>
            <a href="/ui/assets/new" class="btn btn-primary"><i class="bi bi-plus-lg me-1"></i>Add Asset</a>
        </div>

        <div th:if="${success}" class="alert alert-success alert-dismissible fade show" role="alert">
            <span th:text="${success}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
        <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
            <span th:text="${error}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <div class="card shadow-sm">
            <div class="card-body p-0">
                <table class="table table-hover mb-0">
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>Type</th>
                            <th>Serial No.</th>
                            <th>Emp Code</th>
                            <th>Department</th>
                            <th>Branch</th>
                            <th>Status</th>
                            <th>Active</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:if="${#lists.isEmpty(assets)}">
                            <td colspan="9" class="text-center text-muted py-4">No assets found</td>
                        </tr>
                        <tr th:each="asset : ${assets}">
                            <td th:text="${asset.id}"></td>
                            <td th:text="${asset.type}"></td>
                            <td th:text="${asset.serialNumber}"></td>
                            <td th:text="${asset.emp_code}"></td>
                            <td th:text="${asset.department}"></td>
                            <td th:text="${asset.branch}"></td>
                            <td>
                                <span class="badge"
                                      th:classappend="${asset.assetStatus == 'Active'} ? 'bg-success' : 'bg-secondary'"
                                      th:text="${asset.assetStatus}"></span>
                            </td>
                            <td>
                                <span class="badge"
                                      th:classappend="${asset.isActive == 'Yes'} ? 'bg-primary' : 'bg-warning text-dark'"
                                      th:text="${asset.isActive}"></span>
                            </td>
                            <td>
                                <a th:if="${asset.assetFile != null}"
                                   th:href="@{'/' + ${asset.assetFile}}"
                                   target="_blank"
                                   class="btn btn-sm btn-outline-secondary me-1">
                                    <i class="bi bi-paperclip"></i>
                                </a>
                                <a th:href="@{/ui/assets/edit/{id}(id=${asset.id})}" class="btn btn-sm btn-outline-primary me-1">
                                    <i class="bi bi-pencil"></i>
                                </a>
                                <a th:href="@{/ui/assets/delete/{id}(id=${asset.id})}"
                                   class="btn btn-sm btn-outline-danger"
                                   onclick="return confirm('Delete this asset?')">
                                    <i class="bi bi-trash"></i>
                                </a>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
