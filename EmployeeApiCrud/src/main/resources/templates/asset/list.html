<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout :: head('Assets')}"></head>
<body>
<div class="d-flex">
    <div th:replace="~{layout :: navbar}"></div>
    <div class="main-content flex-grow-1">

        <div class="page-header">
            <h4><i class="bi bi-box-seam-fill me-2" style="color:#10b981"></i>Assets</h4>
            <a href="/ui/assets/new" class="btn btn-primary btn-sm px-3">
                <i class="bi bi-plus-lg me-1"></i>Add Asset
            </a>
        </div>

        <div th:if="${success}" class="alert alert-success alert-dismissible fade show" role="alert">
            <i class="bi bi-check-circle-fill me-2"></i><span th:text="${success}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
        <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
            <i class="bi bi-exclamation-circle-fill me-2"></i><span th:text="${error}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <div class="card">
            <div class="card-body p-0">
                <table class="table table-hover mb-0">
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>Type</th>
                            <th>Serial No.</th>
                            <th>Emp Code</th>
                            <th>Department</th>
                            <th>Branch</th>
                            <th>Status</th>
                            <th>Active</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:if="${#lists.isEmpty(assets)}">
                            <td colspan="9" class="text-center py-5">
                                <i class="bi bi-box-seam fs-2 text-muted d-block mb-2"></i>
                                <span class="text-muted">No assets found</span>
                            </td>
                        </tr>
                        <tr th:each="asset : ${assets}">
                            <td><span class="badge bg-light text-secondary fw-normal" th:text="${asset.id}"></span></td>
                            <td class="fw-semibold" th:text="${asset.type}"></td>
                            <td><code style="font-size:0.8rem" th:text="${asset.serialNumber}"></code></td>
                            <td th:text="${asset.emp_code}"></td>
                            <td th:text="${asset.department}"></td>
                            <td th:text="${asset.branch}"></td>
                            <td>
                                <span class="badge rounded-pill"
                                      th:classappend="${asset.assetStatus == 'Active'} ? 'bg-success' : 'bg-secondary'"
                                      th:text="${asset.assetStatus}"></span>
                            </td>
                            <td>
                                <span class="badge rounded-pill"
                                      th:classappend="${asset.isActive == 'Yes'} ? 'bg-primary' : 'bg-warning text-dark'"
                                      th:text="${asset.isActive}"></span>
                            </td>
                            <td>
                                <a th:if="${asset.assetFile != null}"
                                   th:href="@{'/' + ${asset.assetFile}}"
                                   target="_blank"
                                   class="btn btn-sm btn-outline-secondary me-1" title="View File">
                                    <i class="bi bi-paperclip"></i>
                                </a>
                                <a th:href="@{/ui/assets/edit/{id}(id=${asset.id})}"
                                   class="btn btn-sm btn-outline-primary me-1" title="Edit">
                                    <i class="bi bi-pencil"></i>
                                </a>
                                <a th:href="@{/ui/assets/delete/{id}(id=${asset.id})}"
                                   class="btn btn-sm btn-outline-danger" title="Delete"
                                   onclick="return confirm('Delete this asset?')">
                                    <i class="bi bi-trash"></i>
                                </a>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
