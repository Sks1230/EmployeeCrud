<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout :: head('Asset Form')}"></head>
<body>
<div class="d-flex">
    <div th:replace="~{layout :: navbar}"></div>
    <div class="main-content flex-grow-1" style="margin-left: 220px;">
        <div class="mb-4">
            <a href="/ui/assets" class="text-decoration-none text-muted"><i class="bi bi-arrow-left me-1"></i>Back</a>
            <h4 class="mt-2" th:text="${asset.id == null} ? 'Add Asset' : 'Edit Asset'"></h4>
        </div>

        <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

        <div class="card shadow-sm" style="max-width: 600px;">
            <div class="card-body">
                <form th:action="${asset.id == null} ? '/ui/assets/save' : '/ui/assets/update/' + ${asset.id}"
                      method="post" enctype="multipart/form-data">
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label class="form-label">Type</label>
                            <input type="text" name="type" class="form-control" th:value="${asset.type}"/>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Serial Number</label>
                            <input type="text" name="serialNumber" class="form-control" th:value="${asset.serialNumber}"/>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Employee Code</label>
                            <input type="text" name="emp_code" class="form-control" th:value="${asset.emp_code}"/>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Department</label>
                            <input type="text" name="department" class="form-control" th:value="${asset.department}"/>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Branch</label>
                            <input type="text" name="branch" class="form-control" th:value="${asset.branch}"/>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Asset Status</label>
                            <input type="text" name="assetStatus" class="form-control" th:value="${asset.assetStatus}"/>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Is Active</label>
                            <select name="isActive" class="form-select">
                                <option value="Yes" th:selected="${asset.isActive == 'Yes'}">Yes</option>
                                <option value="No" th:selected="${asset.isActive == 'No'}">No</option>
                            </select>
                        </div>
                        <div class="col-12">
                            <label class="form-label">Remarks</label>
                            <textarea name="remarks" class="form-control" rows="3" th:text="${asset.remarks}"></textarea>
                        </div>
                        <div class="col-12" th:if="${asset.id == null}">
                            <label class="form-label">Attachment <small class="text-muted">(JPG, PNG, PDF)</small></label>
                            <input type="file" name="file" class="form-control" accept=".jpg,.jpeg,.png,.pdf"/>
                        </div>
                        <div class="col-12" th:if="${asset.id != null and asset.assetFile != null}">
                            <label class="form-label">Current File</label>
                            <p class="form-control-plaintext text-muted" th:text="${asset.assetFile}"></p>
                        </div>
                    </div>
                    <button type="submit" class="btn btn-primary w-100 mt-4">
                        <span th:text="${asset.id == null} ? 'Create' : 'Update'"></span>
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
