<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout :: head('Asset Form')}"></head>
<body>
<div class="d-flex">
    <div th:replace="~{layout :: navbar}"></div>
    <div class="main-content flex-grow-1">

        <div class="page-header">
            <div>
                <a href="/ui/assets" class="text-decoration-none text-muted small">
                    <i class="bi bi-arrow-left me-1"></i>Back to Assets
                </a>
                <h4 class="mt-1" th:text="${asset.id == null} ? 'Add Asset' : 'Edit Asset'"></h4>
            </div>
        </div>

        <div th:if="${error}" class="alert alert-danger mb-3">
            <i class="bi bi-exclamation-circle-fill me-2"></i><span th:text="${error}"></span>
        </div>

        <div class="card" style="max-width:600px">
            <div class="card-body p-4">
                <form th:action="${asset.id == null} ? '/ui/assets/save' : '/ui/assets/update/' + ${asset.id}"
                      method="post" enctype="multipart/form-data">
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label class="form-label">Type</label>
                            <input type="text" name="type" class="form-control"
                                   placeholder="e.g. Laptop" th:value="${asset.type}"/>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Serial Number</label>
                            <input type="text" name="serialNumber" class="form-control"
                                   placeholder="Serial no." th:value="${asset.serialNumber}"/>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Employee Code</label>
                            <input type="text" name="emp_code" class="form-control"
                                   placeholder="4-digit code" th:value="${asset.emp_code}"/>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Department</label>
                            <input type="text" name="department" class="form-control"
                                   placeholder="Department" th:value="${asset.department}"/>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Branch</label>
                            <input type="text" name="branch" class="form-control"
                                   placeholder="Branch" th:value="${asset.branch}"/>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Asset Status</label>
                            <input type="text" name="assetStatus" class="form-control"
                                   placeholder="Active / Inactive" th:value="${asset.assetStatus}"/>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Is Active</label>
                            <select name="isActive" class="form-select">
                                <option value="Yes" th:selected="${asset.isActive == 'Yes'}">Yes</option>
                                <option value="No" th:selected="${asset.isActive == 'No'}">No</option>
                            </select>
                        </div>
                        <div class="col-12">
                            <label class="form-label">Remarks</label>
                            <textarea name="remarks" class="form-control" rows="3"
                                      placeholder="Any remarks..."
                                      th:text="${asset.remarks}"></textarea>
                        </div>
                        <div class="col-12" th:if="${asset.id == null}">
                            <label class="form-label">Attachment <small class="text-muted fw-normal">(JPG, PNG, PDF)</small></label>
                            <input type="file" name="file" class="form-control" accept=".jpg,.jpeg,.png,.pdf"/>
                        </div>
                        <div class="col-12" th:if="${asset.id != null and asset.assetFile != null}">
                            <label class="form-label">Current File</label>
                            <div class="d-flex align-items-center gap-2 p-2 rounded" style="background:#f8fafc;border:1px solid #e2e8f0">
                                <i class="bi bi-paperclip text-muted"></i>
                                <span class="text-muted small" th:text="${asset.assetFile}"></span>
                            </div>
                        </div>
                    </div>
                    <button type="submit" class="btn btn-primary w-100 mt-4">
                        <i class="bi bi-check-circle me-1"></i>
                        <span th:text="${asset.id == null} ? 'Create Asset' : 'Update Asset'"></span>
                    </button>
                </form>
            </div>
        </div>

    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
