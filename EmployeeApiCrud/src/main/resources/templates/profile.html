<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="layout :: head('My Profile — CRM')"></head>
<body>
<div class="d-flex">
    <div th:replace="layout :: navbar"></div>
    <div class="main-content flex-grow-1" style="margin-left: 220px;">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h4 class="fw-bold mb-0"><i class="bi bi-person-fill me-2"></i>My Profile</h4>
        </div>

        <div th:if="${success}" class="alert alert-success alert-dismissible fade show" role="alert">
            <span th:text="${success}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
        <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
            <span th:text="${error}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <div class="card shadow-sm" style="max-width: 520px;">
            <div class="card-body p-4">
                <div class="mb-3">
                    <label class="form-label text-muted small fw-semibold">EMP CODE</label>
                    <div>
                        <span class="badge bg-secondary fs-6" th:text="${employee.empCode}"></span>
                        <small class="text-muted ms-2">(cannot be changed)</small>
                    </div>
                </div>

                <form method="post" action="/ui/profile">
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Name</label>
                        <input type="text" name="emp_name" class="form-control"
                               th:value="${employee.emp_name}" placeholder="Your name"/>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Salary</label>
                        <input type="number" name="emp_salary" class="form-control" step="0.01"
                               th:value="${employee.emp_salary}" placeholder="Your salary"/>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Age</label>
                        <input type="number" name="emp_age" class="form-control"
                               th:value="${employee.emp_age}" placeholder="Your age"/>
                    </div>
                    <div class="mb-4">
                        <label class="form-label fw-semibold">City</label>
                        <input type="text" name="emp_city" class="form-control"
                               th:value="${employee.emp_city}" placeholder="Your city"/>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">
                        <i class="bi bi-check-circle me-1"></i> Save Changes
                    </button>
                </form>

                <hr class="my-3"/>
                <a href="/ui/change-password" class="btn btn-outline-warning w-100">
                    <i class="bi bi-key-fill me-1"></i> Change Password
                </a>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
