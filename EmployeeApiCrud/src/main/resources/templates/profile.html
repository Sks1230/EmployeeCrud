<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="layout :: head('My Profile')"></head>
<body>
<div class="d-flex">
    <div th:replace="layout :: navbar"></div>
    <div class="main-content flex-grow-1">

        <div class="page-header">
            <h4><i class="bi bi-person-fill me-2" style="color:#6366f1"></i>My Profile</h4>
        </div>

        <div th:if="${success}" class="alert alert-success alert-dismissible fade show" role="alert">
            <i class="bi bi-check-circle-fill me-2"></i><span th:text="${success}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
        <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
            <i class="bi bi-exclamation-circle-fill me-2"></i><span th:text="${error}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <div class="card" style="max-width:520px">
            <div class="card-body p-0">
                <!-- Avatar header -->
                <div class="d-flex align-items-center gap-3 p-4" style="border-bottom:1px solid #f1f5f9">
                    <div style="width:56px;height:56px;background:#6366f1;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.4rem;font-weight:700;color:#fff;flex-shrink:0;"
                         th:text="${#strings.substring(employee.emp_name,0,1).toUpperCase()}">U</div>
                    <div>
                        <div class="fw-bold text-dark" style="font-size:1rem" th:text="${employee.emp_name}"></div>
                        <span class="badge" style="background:#eef2ff;color:#6366f1;font-weight:600;font-size:0.75rem"
                              th:text="'Code: ' + ${employee.empCode}"></span>
                        <span class="ms-1 text-muted small">(cannot be changed)</span>
                    </div>
                </div>

                <!-- Form -->
                <div class="p-4">
                    <form method="post" action="/ui/profile">
                        <div class="row g-3 mb-3">
                            <div class="col-12">
                                <label class="form-label">Full Name</label>
                                <input type="text" name="emp_name" class="form-control"
                                       th:value="${employee.emp_name}" placeholder="Your full name"/>
                            </div>
                            <div class="col-6">
                                <label class="form-label">Age</label>
                                <input type="number" name="emp_age" class="form-control"
                                       th:value="${employee.emp_age}" placeholder="Age"/>
                            </div>
                            <div class="col-6">
                                <label class="form-label">City</label>
                                <input type="text" name="emp_city" class="form-control"
                                       th:value="${employee.emp_city}" placeholder="City"/>
                            </div>
                            <div class="col-12">
                                <label class="form-label">Salary</label>
                                <div class="input-group">
                                    <span class="input-group-text" style="background:#f8fafc;border-color:#e2e8f0;font-size:0.9rem">₹</span>
                                    <input type="number" name="emp_salary" class="form-control" step="0.01"
                                           th:value="${employee.emp_salary}" placeholder="0.00"/>
                                </div>
                            </div>
                        </div>
                        <button type="submit" class="btn btn-primary w-100 mb-3">
                            <i class="bi bi-check-circle me-1"></i>Save Changes
                        </button>
                    </form>
                    <a href="/ui/change-password" class="btn btn-outline-warning w-100">
                        <i class="bi bi-key-fill me-1"></i>Change Password
                    </a>
                </div>
            </div>
        </div>

    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
